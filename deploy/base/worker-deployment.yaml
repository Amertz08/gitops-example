apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-example-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-example-worker
  template:
    metadata:
      labels:
        app: gitops-example-worker
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
      containers:
        - name: worker
          image: amertz08/gitops-example-worker
          envFrom:
            - configMapRef:
                name: gitops-example-config
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
