apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-example-branches
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Amertz08/gitops-example
    targetRevision: main
    path: deploy/argocd/branches
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
