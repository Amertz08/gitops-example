name: Reusable - Register Branch with ArgoCD

on:
  workflow_call:

permissions:
  contents: write

jobs:
  register-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Register branch with ArgoCD
        run: |
          BRANCH="${{ github.ref_name }}"
          SAFE_BRANCH=$(echo "${BRANCH}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          mkdir -p deploy/argocd/branches
          cat > deploy/argocd/branches/${SAFE_BRANCH}.yaml <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: gitops-example-${SAFE_BRANCH}
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/${{ github.repository }}
              targetRevision: ${BRANCH}
              path: deploy/base
              kustomize:
                images:
                  - amertz08/gitops-example:${SAFE_BRANCH}-latest
            destination:
              server: https://kubernetes.default.svc
              namespace: gitops-example-${SAFE_BRANCH}
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
              retry:
                limit: 3
                backoff:
                  duration: 10s
                  factor: 2
                  maxDuration: 3m
          EOF
          git add deploy/argocd/branches/${SAFE_BRANCH}.yaml
          if ! git diff --staged --quiet; then
            git commit -m "chore: register ArgoCD app for branch ${BRANCH}"
            git pull --rebase origin main
            git push origin main
          fi
