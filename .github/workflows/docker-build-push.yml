name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'
    paths:
      - cmd/**
      - internal/**
      - .github/workflows/docker-build-push.yml

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set image tags
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TAGS=docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }},docker.io/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_ENV
          else
            echo "TAGS=docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }},docker.io/${{ env.IMAGE_NAME }}:${BRANCH}-latest" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.description=GitOps Example API
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.vendor=amertz08
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.created=${{ github.event.created_at }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Update image tag in kustomization
        if: github.ref_name == 'main'
        run: |
          sed -i "s/newTag:.*/newTag: ${{ github.sha }}/" deploy/base/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/base/kustomization.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push
