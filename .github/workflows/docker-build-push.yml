name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'
    paths:
      - cmd/**
      - internal/**
      - .github/workflows/docker-build-push.yml
  delete:

permissions:
  contents: write

jobs:
  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set image tags
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TAGS=docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }},docker.io/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_ENV
          else
            echo "TAGS=docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }},docker.io/${{ env.IMAGE_NAME }}:${BRANCH}-latest" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.description=GitOps Example API
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.vendor=amertz08
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.created=${{ github.event.created_at }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Update image tag in kustomization
        if: github.ref_name == 'main'
        run: |
          sed -i "s/newTag:.*/newTag: ${{ github.sha }}/" deploy/base/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/base/kustomization.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git pull --rebase origin main
          git push

      - name: Register branch with ArgoCD
        if: github.ref_name != 'main'
        run: |
          BRANCH="${{ github.ref_name }}"
          SAFE_BRANCH=$(echo "${BRANCH}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          mkdir -p deploy/argocd/branches
          cat > deploy/argocd/branches/${SAFE_BRANCH}.yaml <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: gitops-example-${SAFE_BRANCH}
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/${{ github.repository }}
              targetRevision: ${BRANCH}
              path: deploy/base
              kustomize:
                images:
                  - amertz08/gitops-example:${SAFE_BRANCH}-latest
            destination:
              server: https://kubernetes.default.svc
              namespace: gitops-example-${SAFE_BRANCH}
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
              retry:
                limit: 3
                backoff:
                  duration: 10s
                  factor: 2
                  maxDuration: 3m
          EOF
          git add deploy/argocd/branches/${SAFE_BRANCH}.yaml
          if ! git diff --staged --quiet; then
            git commit -m "chore: register ArgoCD app for branch ${BRANCH}"
            git pull --rebase origin main
            git push origin main
          fi

  cleanup-branch:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Remove branch ArgoCD application
        run: |
          BRANCH="${{ github.event.ref }}"
          SAFE_BRANCH=$(echo "${BRANCH}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          if [ -f "deploy/argocd/branches/${SAFE_BRANCH}.yaml" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm deploy/argocd/branches/${SAFE_BRANCH}.yaml
            git commit -m "chore: remove ArgoCD app for deleted branch ${BRANCH}"
            git pull --rebase origin main
            git push origin main
          fi
